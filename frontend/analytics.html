<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据分析 - 学生信息管理系统</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo"><i class="fas fa-graduation-cap"></i></div>
                <h2>学生管理系统</h2>
            </div>
            <nav class="sidebar-nav"></nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar"><i class="fas fa-user"></i></div>
                    <div class="user-details">
                        <div class="name">-</div>
                        <div class="role">-</div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-left"><h2>数据分析</h2></div>
                <div class="header-right">
                    <button class="header-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i></button>
                    <button class="header-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </header>

            <div class="page-content">
                <div class="card">
                    <div class="card-header"><h3><i class="fas fa-chart-line"></i> 用户活动趋势（最近30天）</h3></div>
                    <div class="card-body">
                        <div class="chart-container">
                            <canvas id="activityChart"></canvas>
                        </div>
                    </div>
                </div>

                <div class="card" style="margin-top: 20px;">
                    <div class="card-header"><h3><i class="fas fa-users"></i> 活跃用户排行（最近7天）</h3></div>
                    <div class="card-body">
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr><th>排名</th><th>用户</th><th>操作次数</th><th>最后活跃</th></tr>
                                </thead>
                                <tbody id="userActivityTable"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script src="js/charts.js"></script>
    <script>
        async function loadAnalytics() {
            try {
                const [activityRes, userRes] = await Promise.all([
                    apiGet('/analytics/daily-activity?days=30'),
                    apiGet('/analytics/user-activity'),
                ]);

                if (activityRes.success) {
                    const data = activityRes.data;
                    const dates = [...new Set(data.map(d => d.date))].sort();
                    const actions = [...new Set(data.map(d => d.action))];
                    
                    const datasets = actions.map((action, idx) => {
                        const colors = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444'];
                        return {
                            label: action,
                            data: dates.map(date => {
                                const item = data.find(d => d.date === date && d.action === action);
                                return item ? parseInt(item.count) : 0;
                            }),
                            color: colors[idx % colors.length],
                        };
                    });

                    // Simple line chart for each action
                    createLineChart('activityChart', dates, datasets[0]?.data || []);
                }

                if (userRes.success) {
                    const tbody = document.getElementById('userActivityTable');
                    tbody.innerHTML = userRes.data.map((u, idx) => `
                        <tr>
                            <td><strong>${idx + 1}</strong></td>
                            <td>${u.display_name || u.username}</td>
                            <td>${u.action_count}</td>
                            <td>${u.last_action ? formatDateTime(u.last_action) : '-'}</td>
                        </tr>
                    `).join('');
                }
            } catch (err) {
                showToast('加载分析数据失败: ' + err.message, 'error');
            }
        }

        document.getElementById('refreshBtn').addEventListener('click', loadAnalytics);

        window.addEventListener('DOMContentLoaded', () => {
            initPage();
            loadAnalytics();
        });
    </script>
</body>
</html>
