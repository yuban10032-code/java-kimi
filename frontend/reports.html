<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统计报表 - 学生信息管理系统</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo"><i class="fas fa-graduation-cap"></i></div>
                <h2>学生管理系统</h2>
            </div>
            <nav class="sidebar-nav"></nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar"><i class="fas fa-user"></i></div>
                    <div class="user-details">
                        <div class="name">-</div>
                        <div class="role">-</div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-left"><h2>统计报表</h2></div>
                <div class="header-right">
                    <button class="header-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i></button>
                    <button class="header-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </header>

            <div class="page-content">
                <div class="card">
                    <div class="card-header"><h3><i class="fas fa-layer-group"></i> 年级汇总</h3></div>
                    <div class="card-body">
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr><th>年级</th><th>总人数</th><th>男生</th><th>女生</th><th>在读</th><th>已毕业</th></tr>
                                </thead>
                                <tbody id="gradeSummaryTable"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="card" style="margin-top: 20px;">
                    <div class="card-header"><h3><i class="fas fa-graduation-cap"></i> 专业汇总</h3></div>
                    <div class="card-body">
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr><th>专业</th><th>学生数</th><th>班级数</th><th>平均年龄</th></tr>
                                </thead>
                                <tbody id="majorSummaryTable"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="card" style="margin-top: 20px;">
                    <div class="card-header"><h3><i class="fas fa-chart-line"></i> 课程成绩分析</h3></div>
                    <div class="card-body">
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>课程</th><th>人数</th><th>平均分</th><th>最高分</th><th>最低分</th>
                                        <th>标准差</th><th>优秀</th><th>及格</th><th>不及格</th>
                                    </tr>
                                </thead>
                                <tbody id="scoreAnalysisTable"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script>
        async function loadReports() {
            try {
                const [gradeRes, majorRes, scoreRes] = await Promise.all([
                    apiGet('/reports/grade-summary'),
                    apiGet('/reports/major-summary'),
                    apiGet('/reports/score-analysis'),
                ]);

                if (gradeRes.success) {
                    const tbody = document.getElementById('gradeSummaryTable');
                    tbody.innerHTML = gradeRes.data.map(r => `
                        <tr>
                            <td><strong>${r.grade}</strong></td>
                            <td>${r.total_students}</td>
                            <td>${r.male_count}</td>
                            <td>${r.female_count}</td>
                            <td>${r.active_count}</td>
                            <td>${r.graduated_count}</td>
                        </tr>
                    `).join('');
                }

                if (majorRes.success) {
                    const tbody = document.getElementById('majorSummaryTable');
                    tbody.innerHTML = majorRes.data.map(r => `
                        <tr>
                            <td><strong>${r.major}</strong></td>
                            <td>${r.total_students}</td>
                            <td>${r.class_count}</td>
                            <td>${r.avg_age}</td>
                        </tr>
                    `).join('');
                }

                if (scoreRes.success) {
                    const tbody = document.getElementById('scoreAnalysisTable');
                    tbody.innerHTML = scoreRes.data.map(r => `
                        <tr>
                            <td><strong>${r.course_name}</strong></td>
                            <td>${r.total_students}</td>
                            <td>${r.avg_score}</td>
                            <td>${r.max_score}</td>
                            <td>${r.min_score}</td>
                            <td>${r.std_dev}</td>
                            <td><span class="badge badge-success">${r.excellent_count}</span></td>
                            <td><span class="badge badge-info">${r.pass_count}</span></td>
                            <td><span class="badge badge-danger">${r.fail_count}</span></td>
                        </tr>
                    `).join('');
                }
            } catch (err) {
                showToast('加载报表失败: ' + err.message, 'error');
            }
        }

        document.getElementById('refreshBtn').addEventListener('click', loadReports);

        window.addEventListener('DOMContentLoaded', () => {
            initPage();
            loadReports();
        });
    </script>
</body>
</html>
