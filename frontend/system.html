<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统监控 - 学生信息管理系统</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo"><i class="fas fa-graduation-cap"></i></div>
                <h2>学生管理系统</h2>
            </div>
            <nav class="sidebar-nav"></nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar"><i class="fas fa-user"></i></div>
                    <div class="user-details">
                        <div class="name">-</div>
                        <div class="role">-</div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-left"><h2>系统监控</h2></div>
                <div class="header-right">
                    <button class="header-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i></button>
                    <button class="header-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </header>

            <div class="page-content">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon blue"><i class="fas fa-server"></i></div>
                        <div class="stat-info">
                            <h4 id="nodeVersion">-</h4>
                            <p>Node.js版本</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon green"><i class="fas fa-clock"></i></div>
                        <div class="stat-info">
                            <h4 id="uptime">-</h4>
                            <p>运行时间</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon orange"><i class="fas fa-memory"></i></div>
                        <div class="stat-info">
                            <h4 id="memoryUsed">-</h4>
                            <p>内存使用</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon red"><i class="fas fa-microchip"></i></div>
                        <div class="stat-info">
                            <h4 id="cpuCount">-</h4>
                            <p>CPU核心数</p>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header"><h3><i class="fas fa-database"></i> 数据库表大小</h3></div>
                    <div class="card-body">
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr><th>表名</th><th>大小</th></tr>
                                </thead>
                                <tbody id="dbTableSizes"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="card" style="margin-top: 20px;">
                    <div class="card-header"><h3><i class="fas fa-list-ol"></i> 数据库索引</h3></div>
                    <div class="card-body">
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr><th>表名</th><th>索引名</th><th>大小</th></tr>
                                </thead>
                                <tbody id="dbIndexes"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script>
        async function loadSystemInfo() {
            try {
                const res = await apiGet('/system/info');
                if (res.success) {
                    const data = res.data;
                    document.getElementById('nodeVersion').textContent = data.nodeVersion;
                    document.getElementById('uptime').textContent = data.uptimeFormatted;
                    document.getElementById('memoryUsed').textContent = data.memory.heapUsed;
                    document.getElementById('cpuCount').textContent = data.cpu + '核';
                }
            } catch (err) {
                showToast('加载系统信息失败: ' + err.message, 'error');
            }
        }

        async function loadDbStats() {
            try {
                const res = await apiGet('/system/db-stats');
                if (res.success) {
                    const tableBody = document.getElementById('dbTableSizes');
                    tableBody.innerHTML = res.data.tables.map(t => `
                        <tr><td>${t.tablename}</td><td>${t.size}</td></tr>
                    `).join('');

                    const indexBody = document.getElementById('dbIndexes');
                    indexBody.innerHTML = res.data.indexes.map(i => `
                        <tr><td>${i.tablename}</td><td>${i.indexname}</td><td>${i.size}</td></tr>
                    `).join('');
                }
            } catch (err) {
                showToast('加载数据库统计失败: ' + err.message, 'error');
            }
        }

        document.getElementById('refreshBtn').addEventListener('click', () => {
            loadSystemInfo();
            loadDbStats();
        });

        window.addEventListener('DOMContentLoaded', () => {
            initPage();
            loadSystemInfo();
            loadDbStats();
        });
    </script>
</body>
</html>
